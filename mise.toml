[tools]
uv = "latest"

[tasks.ruff]
run = "uv run ruff check"

[tasks.ty]
run = "uv run ty check"

[tasks.test]
run = "uv run pytest"

[tasks.check]
depends = ["ruff", "ty", "test"]

[tasks.sniff-start]
run = "./scripts/sniff-start"

[tasks.sniff-stop]
run = "./scripts/sniff-stop"

[tasks.sniff-copy]
run = "./scripts/sniff-copy"

[tasks.bluetoothd-debug-enable]
run = "./scripts/bluetoothd-debug-enable"

[tasks.bluetoothd-debug-disable]
run = "./scripts/bluetoothd-debug-disable"

[tasks.bluetoothd-debug-tail]
run = "./scripts/bluetoothd-debug-tail"

[tasks.manual-connect-after-load-conn]
run = "./scripts/manual-connect-after-load-conn"

[tasks.manual-connect-after-load-conn-host]
run = "./scripts/manual-connect-after-load-conn-host"
